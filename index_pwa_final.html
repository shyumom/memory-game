<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>기억력 불빛 게임</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f5bd8">
<meta name="application-name" content="기억력 불빛 게임">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="불빛게임">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Arial", sans-serif;
  text-align: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f5bd8, #19b6ff, #7ee8ff);
  overflow-x: hidden;
  color: white;
}

.screen {
  min-height: 100vh;
  padding: 36px 24px;
  display: none;
}

.screen.active { display: block; }

.card {
  max-width: 720px;
  margin: 0 auto;
  padding: 34px;
  border-radius: 32px;
  background: rgba(255, 255, 255, 0.18);
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  backdrop-filter: blur(14px);
}

h1 {
  font-size: 46px;
  margin: 10px 0 20px;
  text-shadow: 0 4px 12px rgba(0,0,0,0.25);
}

.subtitle {
  font-size: 24px;
  margin-bottom: 30px;
}

.input-box { margin: 20px 0; }

label {
  display: block;
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 10px;
}

input {
  font-size: 26px;
  padding: 16px;
  border-radius: 18px;
  border: none;
  text-align: center;
  width: 260px;
}

.help {
  font-size: 18px;
  opacity: 0.95;
  margin-top: 8px;
}

.btn {
  font-size: 26px;
  padding: 16px 34px;
  border-radius: 20px;
  border: none;
  margin: 10px;
  cursor: pointer;
  font-weight: bold;
}

.btn-main {
  background: #ffffff;
  color: #0f5bd8;
}

.btn-sub {
  background: rgba(255,255,255,0.25);
  color: white;
  border: 2px solid rgba(255,255,255,0.7);
}

.btn-danger {
  background: #ff4d6d;
  color: white;
}

#sampleLight {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: #ffe066;
  margin: 20px auto;
  opacity: 0.45;
  box-shadow: inset 0 -8px 0 rgba(0,0,0,0.2);
}

#sampleLight.sample-active {
  opacity: 1;
  transform: scale(1.18);
  box-shadow: 0 0 40px white, 0 0 80px #ffe066;
}

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

#level, #record, #message {
  font-weight: bold;
  text-shadow: 0 3px 10px rgba(0,0,0,0.25);
}

#level {
  font-size: 34px;
  margin: 10px;
}

#record {
  font-size: 24px;
  margin: 10px;
}

#message {
  font-size: 31px;
  margin: 22px;
  min-height: 45px;
}

.game-board {
  position: relative;
  width: 430px;
  height: 430px;
  margin: 24px auto;
}

.light {
  position: absolute;
  width: 135px;
  height: 135px;
  border-radius: 50%;
  opacity: 0.42;
  border: 5px solid rgba(255,255,255,0.7);
  cursor: pointer;
  transition: 0.18s;
  box-shadow: inset 0 -10px 0 rgba(0,0,0,0.22), 0 8px 20px rgba(0,0,0,0.25);
}

.active-light {
  opacity: 1;
  transform: scale(1.18);
  box-shadow: 0 0 35px white, 0 0 75px currentColor;
}

#light1 { background: #ff4d6d; top: 0; left: 0; color: #ff4d6d; }
#light2 { background: #ffd166; top: 0; right: 0; color: #ffd166; }
#light3 { background: #06d6a0; bottom: 0; left: 0; color: #06d6a0; }
#light4 { background: #118ab2; bottom: 0; right: 0; color: #118ab2; }
#light5 { background: #9b5de5; top: 147px; left: 147px; color: #9b5de5; }

.celebrate {
  animation: pop 0.8s ease-in-out 3;
  color: #fff176;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

.confetti {
  position: fixed;
  top: -30px;
  font-size: 32px;
  animation: fall 2.4s linear forwards;
  pointer-events: none;
  z-index: 999;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.flash-screen {
  animation: flash 0.5s ease-in-out 2;
}

@keyframes flash {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.5); }
  100% { filter: brightness(1); }
}

@media (max-width: 520px) {
  .screen { padding: 24px 14px; }
  .card { padding: 24px 18px; border-radius: 24px; }
  h1 { font-size: 34px; }
  .subtitle, label, #record { font-size: 20px; }
  input { width: 220px; font-size: 22px; }
  .btn { font-size: 22px; padding: 14px 24px; }
  #level { font-size: 28px; }
  #message { font-size: 24px; margin: 18px 8px; }
  .game-board {
    width: 330px;
    height: 330px;
  }
  .light {
    width: 105px;
    height: 105px;
  }
  #light5 {
    top: 112px;
    left: 112px;
  }
}

</style>
</head>

<body onload="loadBestRecord()">

<section id="startScreen" class="screen active">
  <div class="card">
    <h1>🌊 기억력 불빛 게임</h1>
    <div class="subtitle">불빛 순서를 기억하고 그대로 눌러보세요!</div>

    <div class="input-box">
      <label for="playerName">도전자 이름</label>
      <input id="playerName" type="text" placeholder="이름 입력" maxlength="10">
    </div>

    <div class="input-box">
      <label for="blinkTime">불빛 깜박이는 시간</label>
      <input id="blinkTime" type="number" min="0.1" max="2.0" step="0.1" value="0.7">
      <div class="help">0.1초 ~ 2.0초까지 입력할 수 있어요. 숫자가 클수록 쉬워요.</div>
    </div>

    <div id="sampleLight"></div>

    <button class="btn btn-sub" onclick="playSample()">샘플 보기</button>
    <button class="btn btn-main" onclick="enterGame()">입장하기</button>

    <div class="help" id="startRecord">최고 기록: 없음</div>
  </div>
</section>

<section id="gameScreen" class="screen">
  <div class="top-bar">
    <button class="btn btn-sub" onclick="goHome()">처음 화면</button>
    <button class="btn btn-danger" onclick="endChallenge()">도전 종료</button>
  </div>

  <div id="record">최고 기록: 없음</div>
  <div id="level">레벨: 1</div>

  <div class="game-board">
    <button class="light" id="light1" onclick="userClick(1)"></button>
    <button class="light" id="light2" onclick="userClick(2)"></button>
    <button class="light" id="light3" onclick="userClick(3)"></button>
    <button class="light" id="light4" onclick="userClick(4)"></button>
    <button class="light" id="light5" onclick="userClick(5)"></button>
  </div>

  <button class="btn btn-main" onclick="startGame()">시작하기</button>

  <div id="message"></div>
</section>

<script>
let level = 1;
let answer = [];
let userAnswer = [];
let clickable = false;
let gameStarted = false;
let blinkTime = 700;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const fireworksSound = new Audio("fireworks.mp3");
const cheerSound = new Audio("crowd-cheer.mp3");
const endingSound = new Audio("ending.mp3");

fireworksSound.volume = 0.9;
cheerSound.volume = 0.9;
endingSound.volume = 0.9;

let bestRecord = JSON.parse(localStorage.getItem("bestRecord_v2")) || {
  name: "",
  count: 0
};

const sounds = {
  1: 261.63,
  2: 293.66,
  3: 329.63,
  4: 392.00,
  5: 440.00
};

function loadBestRecord() {
  const text = bestRecord.count > 0
    ? "🏆 최고 기록: " + bestRecord.name + " / " + bestRecord.count + "개"
    : "최고 기록: 없음";

  document.getElementById("startRecord").textContent = text;
  document.getElementById("record").textContent = text;
}

function getPlayerName() {
  const name = document.getElementById("playerName").value.trim();
  return name || "이름 없음";
}

function getBlinkTime() {
  let value = parseFloat(document.getElementById("blinkTime").value);

  if (isNaN(value)) value = 0.7;
  if (value < 0.1) value = 0.1;
  if (value > 2.0) value = 2.0;

  document.getElementById("blinkTime").value = value.toFixed(1);
  return value * 1000;
}

function enterGame() {
  blinkTime = getBlinkTime();

  document.getElementById("startScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  document.getElementById("message").textContent = "시작하기를 눌러주세요!";
  document.getElementById("level").textContent = "레벨: 1";
  loadBestRecord();
}

function goHome() {
  stopAllSounds();
  resetGame();

  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("startScreen").classList.add("active");
  loadBestRecord();
}

function endChallenge() {
  stopAllSounds();
  playEndingSound();

  document.getElementById("message").textContent = "도전을 종료했어요. 다시 도전해요 💪";
  resetGame();
}

function resetGame() {
  level = 1;
  answer = [];
  userAnswer = [];
  clickable = false;
  gameStarted = false;

  document.getElementById("level").textContent = "레벨: 1";
  document.getElementById("message").classList.remove("celebrate");

  for (let i = 1; i <= 5; i++) {
    document.getElementById("light" + i).classList.remove("active-light");
  }
}

async function playSample() {
  await audioCtx.resume();

  const sample = document.getElementById("sampleLight");
  const time = getBlinkTime();

  sample.classList.add("sample-active");
  playTone(659.25, time / 1000, "sine", 0.22);

  setTimeout(() => {
    sample.classList.remove("sample-active");
  }, time);
}

async function startGame() {
  await audioCtx.resume();
  stopAllSounds();

  blinkTime = getBlinkTime();

  level = 1;
  answer = [];
  userAnswer = [];
  gameStarted = true;

  document.getElementById("message").classList.remove("celebrate");
  document.body.classList.remove("flash-screen");

  addNewLight();
  await playLevel();
}

function addNewLight() {
  answer.push(randomLight());
}

async function playLevel() {
  clickable = false;
  userAnswer = [];

  document.getElementById("level").textContent = "레벨: " + level;
  document.getElementById("message").textContent = "잘 보고 기억하세요 👀";
  document.getElementById("message").classList.remove("celebrate");

  await sleep(700);
  await showLights();

  clickable = true;
  document.getElementById("message").textContent = "이제 순서대로 눌러보세요!";
}

async function showLights() {
  for (let num of answer) {
    const light = document.getElementById("light" + num);

    light.classList.add("active-light");
    playSound(num, blinkTime / 1000);

    await sleep(blinkTime);

    light.classList.remove("active-light");
    await sleep(300);
  }
}

function userClick(num) {
  if (!clickable || !gameStarted) return;

  flashUserLight(num);
  playSound(num, 0.22);
  userAnswer.push(num);

  const index = userAnswer.length - 1;

  if (userAnswer[index] !== answer[index]) {
    document.getElementById("message").textContent = "아쉬워요! 다시 도전해요 💪";
    playEndingSound();
    resetGame();
    return;
  }

  if (userAnswer.length === answer.length) {
    clickable = false;

    const successCount = answer.length;
    const isNewRecord = updateBestRecord(successCount);

    if (level % 5 === 0) {
      bigCelebrate(isNewRecord);
      level++;
      addNewLight();
      setTimeout(playLevel, 4300);
    } else {
      if (isNewRecord) {
        document.getElementById("message").textContent =
          "🏆 신기록! " + getPlayerName() + " / " + successCount + "개 성공!";
        document.getElementById("message").classList.add("celebrate");
        createConfetti(18);
      } else {
        document.getElementById("message").textContent = "좋아요! 다음 단계로 가요 😊";
      }

      playSuccessSound();
      level++;
      addNewLight();

      setTimeout(playLevel, 1400);
    }
  }
}

function updateBestRecord(successCount) {
  const playerName = getPlayerName();

  if (successCount > bestRecord.count) {
    bestRecord = {
      name: playerName,
      count: successCount
    };

    localStorage.setItem("bestRecord_v2", JSON.stringify(bestRecord));
    loadBestRecord();

    return true;
  }

  return false;
}

function flashUserLight(num) {
  const light = document.getElementById("light" + num);

  light.classList.add("active-light");

  setTimeout(() => {
    light.classList.remove("active-light");
  }, 250);
}

function bigCelebrate(isNewRecord) {
  const message = document.getElementById("message");

  if (isNewRecord) {
    message.textContent = "🏆 신기록 달성! " + getPlayerName() + " 최고예요!";
  } else {
    message.textContent = getLevelMessage(level);
  }

  message.classList.add("celebrate");
  document.body.classList.add("flash-screen");

  createConfetti(55);
  playBigCheerSound();

  setTimeout(() => {
    document.body.classList.remove("flash-screen");
  }, 1300);
}

function getLevelMessage(level) {
  if (level === 5) return "🎉 5단계 성공! 대단해요!";
  if (level === 10) return "🏆 10단계 성공! 기억력 대장!";
  if (level === 15) return "🌟 15단계 성공! 완전 멋져요!";
  if (level === 20) return "👑 20단계 성공! 기억력 왕!";
  return "🎊 " + level + "단계 성공! 최고예요!";
}

function createConfetti(count) {
  const emojis = ["🎉", "✨", "⭐", "🎊", "🏆", "💥", "🌊", "💙"];

  for (let i = 0; i < count; i++) {
    const confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.animationDelay = Math.random() * 0.5 + "s";

    document.body.appendChild(confetti);

    setTimeout(() => {
      confetti.remove();
    }, 2700);
  }
}

function playTone(freq, duration = 0.25, type = "sine", volume = 0.2) {
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = type;
  oscillator.frequency.value = freq;

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + duration);
}

function playSound(num, duration = 0.25) {
  playTone(sounds[num] || 220, duration, "sine", 0.22);
}

function playSuccessSound() {
  playTone(523.25, 0.12);
  setTimeout(() => playTone(659.25, 0.12), 130);
  setTimeout(() => playTone(783.99, 0.18), 260);
}


function safePlay(audio) {
  if (!audio) return;

  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // 모바일/브라우저 정책이나 파일 누락으로 소리가 재생되지 않아도 게임은 계속 진행됩니다.
    });
  }
}

function playEndingSound() {
  stopAllSounds();

  endingSound.currentTime = 0;
  safePlay(endingSound);
}

function playBigCheerSound() {
  stopAllSounds();

  fireworksSound.currentTime = 0;
  cheerSound.currentTime = 0;

  safePlay(fireworksSound);

  setTimeout(() => {
    safePlay(cheerSound);
  }, 900);
}

function stopAllSounds() {
  fireworksSound.pause();
  cheerSound.pause();
  endingSound.pause();

  fireworksSound.currentTime = 0;
  cheerSound.currentTime = 0;
  endingSound.currentTime = 0;
}

function randomLight() {
  return Math.floor(Math.random() * 5) + 1;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
</script>


<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("./service-worker.js").catch(function(error) {
        console.log("Service Worker registration failed:", error);
      });
    });
  }
</script>

</body>
</html>
